<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ICE WORLD | Reports</title>

    <link rel="stylesheet" href="../ASSETS/CSS/style.css">
    <link rel="stylesheet" href="../ASSETS/CSS/responsive.css">
    <link rel="stylesheet" href="../ASSETS/CSS/animations.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            ICE WORLD ADMIN

        </div>

        <div>

            <a href="dashboard.html" class="btn">

                Dashboard

            </a>

            <button
                onclick="logoutAdmin()"
                class="btn">

                Logout

            </button>

        </div>

    </nav>

</header>

<section class="container">

    <h1>

        Business Reports

    </h1>

    <p class="subtitle">

        Review sales, performance, and customer activity.

    </p>

    <br>

    <!-- Summary Cards -->

    <div class="dashboard-cards">

        <div class="card">

            <h3>Total Revenue</h3>

            <h2 id="totalRevenue">

                K0

            </h2>

        </div>

        <div class="card">

            <h3>Total Orders</h3>

            <h2 id="totalOrders">

                0

            </h2>

        </div>

        <div class="card">

            <h3>Blocks Sold</h3>

            <h2 id="blocksSoldReport">

                0

            </h2>

        </div>

        <div class="card">

            <h3>Customers</h3>

            <h2 id="customerCount">

                0

            </h2>

        </div>

    </div>

    <br><br>

    <h2>

        Sales Report

    </h2>

    <br>

    <div class="table-wrapper">

        <table class="admin-table">

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Orders</th>

                    <th>Blocks Sold</th>

                    <th>Revenue</th>

                </tr>

            </thead>

            <tbody id="reportTable">

                <!-- Reports Loaded Here -->

            </tbody>

        </table>

    </div>

    <br><br>

    <button class="btn">

        Export PDF

    </button>

    <button class="btn">

        Export Excel

    </button>

    <button class="btn">

        Print Report

    </button>

</section>

<script src="../JS/auth.js"></script>
<script src="../JS/admin.js"></script>

</body>

</html>
