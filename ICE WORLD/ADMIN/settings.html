<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ICE WORLD | Settings</title>

    <link rel="stylesheet" href="../ASSETS/CSS/style.css">
    <link rel="stylesheet" href="../ASSETS/CSS/responsive.css">
    <link rel="stylesheet" href="../ASSETS/CSS/animations.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            ICE WORLD ADMIN

        </div>

        <div>

            <a href="dashboard.html" class="btn">

                Dashboard

            </a>

            <button
                onclick="logoutAdmin()"
                class="btn">

                Logout

            </button>

        </div>

    </nav>

</header>

<section class="container">

    <h1>

        Business Settings

    </h1>

    <p class="subtitle">

        Update your business information and pricing.

    </p>

    <br>

    <form id="settingsForm" class="card-form">

        <div class="input-group">

            <label>

                Company Name

            </label>

            <input
                type="text"
                id="companyName"
                value="ICE WORLD">

        </div>

        <div class="input-group">

            <label>

                Price Per Block (Kina)

            </label>

            <input
                type="number"
                id="pricePerBlock"
                value="6">

        </div>

        <div class="input-group">

            <label>

                Company Phone

            </label>

            <input
                type="text"
                id="companyPhone">

        </div>

        <div class="input-group">

            <label>

                Company Email

            </label>

            <input
                type="email"
                id="companyEmail">

        </div>

        <div class="input-group">

            <label>

                Company Address

            </label>

            <textarea
                id="companyAddress"
                rows="4"></textarea>

        </div>

        <div class="input-group">

            <label>

                Business Hours

            </label>

            <textarea
                id="businessHours"
                rows="3">

Monday - Friday
8:00 AM - 5:00 PM

            </textarea>

        </div>

        <button
            type="submit"
            class="btn">

            Save Settings

        </button>

    </form>

</section>

<script src="../JS/auth.js"></script>

<script src="../JS/admin.js"></script>

</body>

</html>
